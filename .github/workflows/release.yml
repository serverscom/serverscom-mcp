name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  dxt:
    name: Build DXT extension
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download GoReleaser artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Package DXT
        run: |
          mkdir -p dxt/server

          # Copy platform binaries
          cp dist/mcp_linux_amd64_v1/serverscom-mcp      dxt/server/serverscom-mcp-linux-amd64
          cp dist/mcp_linux_arm64_v8.0/serverscom-mcp    dxt/server/serverscom-mcp-linux-arm64
          cp dist/mcp_darwin_amd64_v1/serverscom-mcp     dxt/server/serverscom-mcp-darwin-amd64
          cp dist/mcp_darwin_arm64_v8.0/serverscom-mcp   dxt/server/serverscom-mcp-darwin-arm64
          cp dist/mcp_windows_amd64_v1/serverscom-mcp.exe   dxt/server/serverscom-mcp-windows-amd64.exe
          cp dist/mcp_windows_arm64_v8.0/serverscom-mcp.exe dxt/server/serverscom-mcp-windows-arm64.exe
          cp server/run.sh dxt/server/run.sh
          chmod +x dxt/server/serverscom-mcp-* dxt/server/run.sh

          # Stamp version into manifest
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' manifest.json > dxt/manifest.json

          cp README.md LICENSE icon.svg dxt/

          cd dxt && zip -r ../serverscom-mcp.dxt . && cd ..
          echo "Built serverscom-mcp.dxt ($(du -sh serverscom-mcp.dxt | cut -f1))"

      - name: Upload DXT to release
        run: |
          gh release upload "$GITHUB_REF_NAME" serverscom-mcp.dxt --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  npm-publish:
    name: Publish npm packages
    runs-on: ubuntu-latest
    needs: goreleaser
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Update npm (required for trusted publishing)
        run: npm install -g npm@latest

      - name: Download GoReleaser artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Build npm packages
        run: |
          npx -y goreleaser-npm-publisher build \
            --prefix "@servers.com" \
            --description "MCP server for Servers.com infrastructure management" \
            --license MIT \
            --keywords "mcp,serverscom,dedicated-servers,infrastructure" \
            --files README.md --files LICENSE \
            --clear

      - name: Fix npm packages
        run: |
          node -e "
            const fs = require('fs');
            const repo = 'https://github.com/serverscom/serverscom-mcp';
            const dirs = fs.readdirSync('dist/npm');
            for (const dir of dirs) {
              const p = 'dist/npm/' + dir + '/package.json';
              const pkg = JSON.parse(fs.readFileSync(p));
              pkg.repository = { type: 'git', url: repo };
              if (dir === 'mcp') {
                pkg.bin = { 'serverscom-mcp': 'index.js' };
              }
              fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + '\n');
              console.log('fixed:', pkg.name);
            }
          "

      - name: Publish npm packages
        run: |
          for dir in dist/npm/*/; do
            echo "Publishing $dir..."
            npm publish "$dir" --access public --provenance
          done
